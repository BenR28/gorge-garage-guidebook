<!doctype html>
<html lang="en">
    <head>
        <title>Garage</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css" />
        <link rel="icon" type="image/x-icon" href="" />
    </head>
    <body>
        <div id="header">
            <h1>Gorge Garage</h1>
            <h5>The Guidebook To Our Garage</h5>
        </div>
        <details id="navbar">
            <summary>-> Settings <-</summary>
            <div class="navbarItem">
                <a
                    class="navbarItem"
                    href="https://docs.google.com/forms/d/e/1FAIpQLScrrvi30aAAG24rA1tF96Gb7JwqhxIQfu8uxc0DwLtf53aNGA/viewform?usp=dialog"
                    >Submit Climb</a
                >
            </div>
            <div class="navbarItem">
                <a
                    class="navbarItem"
                    href="https://docs.google.com/forms/d/e/1FAIpQLSenq8qB4ZwXsIPxFdOyHBVpnf4YYzMxTaTut7Tqx1F3VXwGlA/viewform?usp=dialog"
                    >Log Ascent</a
                >
            </div>
            <div class="navbarItem">
            <button class="navbarItem" id="usersBtn" onclick="toggleUsers()">
                Show Users
            </button>
            <div id="users-list"></div>
            </div>
            <div class="navbarItem">
                <a class="navbarItem" href="og-wall.html">Garage Wall</a>
            </div>
            <div class="navbarItem">
            <button
                class="navbarItem"
                onclick="cycleBackground()"
                id="bg-selector"
            >
                Change Background
            </button>
            </div>
        </details>

        <div id="controls">
            <!-- Search -->
            <input type="text" id="search" placeholder="Search climbs..." />

            <!-- Filters -->
            <div id="filters">
                <input id="minGrade" placeholder="Min (VB)" />
                <input id="maxGrade" placeholder="Max (V17)" />
            </div>

            <!-- Sorting -->
            <select id="sort">
                <option value="default">Sort</option>
                <option value="grade-asc">Grade ↑</option>
                <option value="grade-desc">Grade ↓</option>
                <option value="rating-desc">Rating ⭐</option>
                <option value="date-desc">Newest</option>
                <option value="date-asc">Oldest</option>
            </select>
        </div>

        <div id="climb-list"></div>

        <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
